<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيف القاضي - مصمم جرافيك</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            margin: 0 auto 20px auto;
            display: block;
        }
        h1 { font-size: 32px; margin-bottom: 10px; }
        .job { font-size: 18px; opacity: 0.9; margin-bottom: 20px; }
        .bio { font-size: 16px; line-height: 1.8; margin-bottom: 30px; }
        .buttons { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }
        .whatsapp { background: #25D366; }
        .facebook { background: #1877F2; }
        .instagram { background: #E4405F; }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <img src="profile.jpg" alt="سيف القاضي" class="profile-img">
        <h1>سيف القاضي</h1>
        <p class="job">مصمم جرافيك من قنا</p>
        <p class="bio">
            أهلاً بيكم في موقعي 👋<br>
            بشتغل في تصميم الجرافيك وبساعدك تطلع شغلك بأحسن شكل.
        </p>
        <div class="buttons">
            <a href="https://wa.me/201069092002" class="btn whatsapp" target="_blank">
